name: fieldfresh
description: FieldFresh - Farm to Customer Direct Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ── Backend ──────────────────────────────
  supabase_flutter: ^2.3.4

  # ── Firebase ─────────────────────────────
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.19
  firebase_analytics: ^10.8.9
  flutter_local_notifications: ^17.1.2

  # ── State Management ─────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ───────────────────────────
  go_router: ^13.2.0

  # ── Maps (OpenStreetMap - FREE) ───────────
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # ── Payments ─────────────────────────────
  razorpay_flutter: ^1.3.6
  crypto: ^3.0.3

  # ── Images / Camera ──────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.2.0

  # ── UI / Animations ──────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  timeline_tile: ^2.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.10+1

  # ── OTP Input ────────────────────────────
  pinput: ^5.0.0

  # ── HTTP / Network ────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Local Storage (Offline-first) ─────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # ── Utilities ────────────────────────────
  intl: ^0.20.2
  timeago: ^3.6.1
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # ── Localizations ─────────────────────────
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
